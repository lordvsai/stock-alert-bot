name: Stock Alerts

# Runs every 30 minutes, every day. The Python script itself
# checks Indian market hours (Mon–Fri 9:15–15:15 IST) before
# generating price/technical alerts. This way, Telegram commands
# (/add, /remove, etc.) get processed anytime within ~30 minutes.
#
# IMPORTANT: For unlimited free Actions minutes, keep this repo PUBLIC.
# Private repos get only 2,000 minutes/month on free tier.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stock-alerts
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python alert_bot.py

      - name: Commit state / watchlist / config changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json watchlist.txt config.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "auto: state update [skip ci]"
            git push
          fi
